{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green-Basket | Organic Grocery</title>
    
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Link to static files -->
    <link rel="stylesheet" href="{% static 'src/styles.css' %}">
    <link rel="stylesheet" href="{% static 'src/auth.css' %}">
    <link rel="stylesheet" href="{% static 'src/products.css' %}">
    
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <h1>Green-Basket</h1>
        </div>
        <div class="search-bar">
            <form action="/search" method="GET">
                <input type="text" name="q" placeholder="Search fresh produce...">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>
        <div class="header-links">
            <a href="#"><i class="fas fa-heart"></i> <span>Wishlist</span></a>
            <a href="#"><i class="fas fa-shopping-cart"></i> <span>Cart</span></a>
            {% if request.user.is_authenticated %}
            <a href="#"><i class="fas fa-user"></i> <span>Account</span></a>
            {% else %}
            <a href="{% url "login" %}"><i class="fas fa-user"></i><span>Login</span></a>
            {% endif %}
        </div>
    </header>

    <main>
        {% block content %}
        <!-- Content from index.html will be injected here -->
        {% endblock %}
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">About Us</a>
                <a href="#">Contact</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
            </div>
            <p>&copy; 2024 Green-Basket. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
