{% extends "base.html" %}
{% block content %}
    <div class="hero">
        <img src="#" alt="Fresh Produce">
        <h2>Welcome to Green-Basket</h2>
        <p>Your one-stop shop for fresh and organic products.</p>
        <a href="#" class="btn">Shop Now</a>
    </div>
    <div class="featured">
        <h2>Featured Products</h2>
        <div class="product-grid">
            <div class="product-card">
                <div>
                    <img src="static/img/apples.jpg" alt="Product 1">
                    <h3>Organic Apples</h3>
                    <p>$3.99 / lb</p>
                </div>
                <button class="btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <div>
                    <img src="static/img/carrots.jpg" alt="Product 2">
                    <h3>Fresh Carrots</h3>
                    <p>$2.49 / lb</p>
                </div>
                <button class="btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <div>
                    <img src="static/img/bananas.jpeg" alt="Product 3">
                    <h3>Organic Bananas</h3>
                    <p>$1.29 / lb</p>
                </div>
                <button class="btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <div>
                    <img src="static/img/spanich.jpg" alt="Product 4">
                    <h3>Fresh Spinach</h3>
                    <p>$2.99 / bunch</p>
                </div>
                <button class="btn">Add to Cart</button>
            </div>
            </div>
        </div>
    </div>
{% endblock content %}
